    <script>
        // Performance optimization
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {
                    // Service worker registration failed, continue without it
                });
            });
        }
        
        // Prevent FOUC (Flash of Unstyled Content)
        document.documentElement.style.setProperty('--initial-color-mode', 'light');
        
        // Error handling for uncaught errors
        window.addEventListener('error', (event) => {
            console.error('Global error:', event.error?.message || event.message);
            // Prevent error from breaking the app
            event.preventDefault();
        });
        
        window.addEventListener('unhandledrejection', (event) => {
            console.error('Unhandled promise rejection:', event.reason?.message || event.reason);
            // Prevent unhandled rejection from breaking the app
            event.preventDefault();
        });
    </script>
